name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🏗️ Build Project (React/Vite)
      run: npm run build

    # The FTP account's login root contains a "public_html" folder, and the
    # site's real webroot (confirmed via Hostinger's own File Manager, which
    # is domain-aware) is one level deeper still: public_html/public_html/.
    - name: 📂 Sync files to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        local-dir: ./dist/
        server-dir: public_html/public_html/

    # Separate sync so the SEO admin panel's code stays up to date, without
    # ever touching config.php / seo-data.json (both gitignored, so they never
    # exist in this checkout and this step can't overwrite or delete them).
    - name: 🔐 Sync SEO admin panel to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        local-dir: ./seo-admin/
        server-dir: public_html/public_html/seo-admin/
