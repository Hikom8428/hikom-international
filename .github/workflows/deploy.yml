name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🏗️ Build Project (React/Vite)
      run: npm run build

    # This FTP account's login session already lands inside public_html/ (per
    # Hostinger's FTP Accounts page and confirmed via FileZilla), so server-dir
    # must be root here - setting it to "public_html/" was creating a second,
    # nested public_html/public_html/ folder instead of updating the real one.
    - name: 📂 Sync files to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        local-dir: ./dist/
        server-dir: ./

    # Separate sync so the SEO admin panel's code stays up to date, without
    # ever touching config.php / seo-data.json (both gitignored, so they never
    # exist in this checkout and this step can't overwrite or delete them).
    - name: 🔐 Sync SEO admin panel to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        local-dir: ./seo-admin/
        server-dir: ./seo-admin/
