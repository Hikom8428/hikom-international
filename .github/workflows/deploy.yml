name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🏗️ Build Project (React/Vite)
      run: npm run build

    # FTP root ("/") contains public_html/ as a subfolder (confirmed via
    # FileZilla) - so server-dir must be "public_html/". Repeated path changes
    # while debugging left the action's own state-tracking file out of sync
    # with reality, so this one deploy forces a full clean-slate resync
    # (delete everything under public_html/ first, then upload dist/ fresh)
    # to clear out any stale/leftover state once and for all.
    - name: 📂 Sync files to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        local-dir: ./dist/
        server-dir: public_html/
        dangerous-clean-slate: true

    # Separate sync so the SEO admin panel's code stays up to date, without
    # ever touching config.php / seo-data.json (both gitignored, so they never
    # exist in this checkout and this step can't overwrite or delete them).
    # No clean-slate here - it would wipe any live SEO data already saved.
    - name: 🔐 Sync SEO admin panel to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        local-dir: ./seo-admin/
        server-dir: public_html/seo-admin/
