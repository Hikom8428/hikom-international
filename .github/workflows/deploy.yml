name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy to Hostinger via lFTP
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🏗️ Build Project (React/Vite)
      run: npm run build

    - name: 🚀 Install lftp
      run: sudo apt-get install lftp -y

    - name: 📂 Sync files to Hostinger
      env:
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        FTP_HOST: ${{ secrets.FTP_SERVER }}
      run: |
        lftp -c "set ftp:ssl-allow no; open -u $FTP_USER,'$FTP_PASS' $FTP_HOST; mirror -R -v ./dist/ /public_html/ --parallel=10 --exclude-glob .git* --exclude-glob .DS_Store; quit"