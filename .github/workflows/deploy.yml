name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🏗️ Build Project (React/Vite)
      run: npm run build

    # The real webroot is /domains/hikom.in/public_html/ (confirmed via
    # FileZilla) - Hostinger's multi-site account layout, not the top-level
    # /public_html/ we'd been targeting. This FTP account's session already
    # lands there by default, so server-dir is root ("./"). Clean-slate
    # clears out the stale deploy-state file that caused the last "./"
    # attempt to error out trying to delete an already-gone directory.
    - name: 📂 Sync files to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        local-dir: ./dist/
        server-dir: ./
        dangerous-clean-slate: true

    # Separate sync so the SEO admin panel's code stays up to date, without
    # ever touching config.php / seo-data.json (both gitignored, so they never
    # exist in this checkout and this step can't overwrite or delete them).
    # No clean-slate here - it would wipe any live SEO data already saved.
    - name: 🔐 Sync SEO admin panel to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        local-dir: ./seo-admin/
        server-dir: ./seo-admin/
